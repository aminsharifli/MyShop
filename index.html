<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyShop</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="navbar">
                <div class="logo">MyShop</div>
                <div class="sebetIcon" onclick="sebetAc()">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="9" cy="20" r="1.5"></circle>
                        <circle cx="18" cy="20" r="1.5"></circle>
                        <path d="M3 4h2l2.2 10.2a1 1 0 0 0 1 .8h8.9a1 1 0 0 0 1-.8L20 7H7"></path>
                    </svg>
                    <span id="sebetSayi">0</span>
                </div>
            </div>
        </div>
    </header>
    <div id="qaraFon" onclick="sebetAc()"></div>
    <!-- Sebet -->
    <div id="sebet">
        <div class="sebetTop">
            <h2>Sebet</h2>
            <button onclick="sebetAc()">×</button>
        </div>
        <div id="sebetList"></div>
        <div class="sebetAlt">Umumi: $<span id="yekun">0.00</span></div>
    </div>
    <div class="container">
        <div id="cards"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
